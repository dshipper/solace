name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:integration

  # The iOS suite (42 unit tests + a live-server UI test) needs a macOS runner
  # with Xcode + XcodeGen; run it locally with `npm run ios:test` for now.
